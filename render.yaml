services:
  - type: web
    name: expense-tracker-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        generateValue: false
      - key: SUPABASE_URL
        generateValue: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        generateValue: false
